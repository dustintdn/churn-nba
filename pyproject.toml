[tool.ruff]
# Keep linting fast and focused; line length matches the notebook/code style.
line-length = 100
target-version = "py311"
extend-exclude = ["build_notebook.py"]

[tool.ruff.lint]
# pycodestyle errors, pyflakes, isort, bugbear, pyupgrade.
select = ["E", "F", "I", "B", "UP"]
ignore = ["E501"]  # long lines in commented code/strings are fine here
