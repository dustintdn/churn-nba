name: CI

# Lint + test on every push and pull request to the main branches.
on:
  push:
    branches: ["main", "claude/**"]
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff

      - name: Lint (ruff)
        run: ruff check src/ tests/ app/

      - name: Run tests (against the committed model artifact)
        run: pytest

      - name: Smoke-check training end-to-end (fast mode)
        run: python src/train.py --fast
